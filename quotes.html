                    logo.style.cursor = 'pointer';

                        sublogo.style.transition = "0.4s";

                    <h4>Quote Box</h4>
                    <div class="paragraph" id="paragraph" style="border: 2px solid black;

            <script>

                randomQuote();

                function randomQuote(){

                    const quoteBox = document.getElementById("quoteBox");
                    const author = document.getElementById("author");
                    let x = Math.floor(Math.random()*1643)
                    
                    function quote(x){
                
                        fetch("https://type.fit/api/quotes")
                            .then(function(response) {
                                return response.json();
                            })
                            .then(function(data) {
                                
                                console.log(data[x].text);
                                quoteBox.innerText = '\" '+data[x].text+'\"';
                                author.innerText = "- "+data[x].author;
                                author.style.textAlign = "right";
                                author.style.paddingRight = "20%"
                        });
                    }

                    quote(x);
                }

                function btn1_function(){
                    const quoteBox = document.getElementById("paragraph");
                    quoteBox.style.backgroundColor = "rgb(230, 152, 8)";
                    randomQuote();
                }

                function btn2_function(){
                    const quoteBox = document.getElementById("paragraph");
                    quoteBox.style.backgroundColor = "#088395";
                    randomQuote();
                }

                function btn3_funciton(){
                    const quoteBox = document.getElementById("paragraph");
                    quoteBox.style.backgroundColor = "blueviolet";
                    randomQuote();
                }


                function btn4_function(){
                    const quoteBox = document.getElementById("paragraph");
                    quoteBox.style.backgroundColor = "green";
                    randomQuote();
                }

            </script>
